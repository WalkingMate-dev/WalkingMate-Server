name: deploy

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'music_server/**'
      - 'server.py'
      - 'run_worker.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'deploy/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  buildImageAndPush:
    name: 도커 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.export_owner.outputs.owner_lc }}
      image_name: ${{ steps.export_image.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - name: 레지스트리 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 소유자 소문자 변환
        id: export_owner
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

      - name: 이미지 이름 설정
        id: export_image
        run: echo "image_name=walkingmate-server" >> "$GITHUB_OUTPUT"

      - name: 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:latest

  deploy:
    name: AWS SSM 배포
    needs: [buildImageAndPush]
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: AWS 계정 확인
        shell: bash
        run: aws sts get-caller-identity

      - name: EC2 인스턴스 ID 조회
        id: get_instance_id
        shell: bash
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances --filters \
            "Name=tag:Name,Values=walkingmate-ec2" \
            "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -z "$INSTANCE_IDS" ] || [ "$INSTANCE_IDS" = "None" ]; then
            echo "실행 중인 인스턴스를 찾지 못했습니다"
            exit 1
          fi

          INSTANCE_COUNT=$(wc -w <<< "$INSTANCE_IDS")
          if [ "$INSTANCE_COUNT" -ne 1 ]; then
            echo "실행 중인 walkingmate-ec2 인스턴스가 ${INSTANCE_COUNT}개입니다. 정확히 1개여야 합니다."
            aws ec2 describe-instances --filters \
              "Name=tag:Name,Values=walkingmate-ec2" \
              "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].{InstanceId:InstanceId,PrivateIp:PrivateIpAddress,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}" \
              --output table
            exit 1
          fi

          INSTANCE_ID="$INSTANCE_IDS"
          aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query "Reservations[].Instances[].{InstanceId:InstanceId,State:State.Name,PrivateIp:PrivateIpAddress,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}" \
            --output table
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"

      - name: SSM 배포
        shell: bash
        run: |
          set -euo pipefail

          # 1) 기존 InProgress 명령 정리
          IN_PROGRESS_IDS=$(aws ssm list-command-invocations \
            --details \
            --query "CommandInvocations[?InstanceId=='${INSTANCE_ID}' && Status=='InProgress'].CommandId" \
            --output text || true)

          if [ -n "${IN_PROGRESS_IDS:-}" ] && [ "${IN_PROGRESS_IDS}" != "None" ]; then
            echo "기존 InProgress 명령 정리: $IN_PROGRESS_IDS"
            for OLD_ID in $IN_PROGRESS_IDS; do
              aws ssm cancel-command --command-id "$OLD_ID" >/dev/null 2>&1 || true
            done

            for i in $(seq 1 24); do
              REMAINING=$(aws ssm list-command-invocations \
                --details \
                --query "CommandInvocations[?InstanceId=='${INSTANCE_ID}' && Status=='InProgress'].CommandId" \
                --output text || true)
              if [ -z "${REMAINING:-}" ] || [ "$REMAINING" = "None" ]; then
                echo "기존 InProgress 명령 정리 완료"
                break
              fi
              echo "기존 명령 취소 대기 중... ($i/24)"
              sleep 5
            done
          fi

          WALKINGMATE_ENV_B64="$(printf '%s' '${{ secrets.WALKINGMATE_ENV }}' | base64 -w 0)"
          COMMANDS=$(cat <<'EOF_SCRIPT'
            set -euo pipefail

            IMAGE="ghcr.io/${{ needs.buildImageAndPush.outputs.owner_lc }}/${{ needs.buildImageAndPush.outputs.image_name }}:latest"
            APP_NAME="walkingmate_app"
            NETWORK="common"
            ENV_FILE="/opt/walkingmate/.env"
            APP_DIR="/opt/walkingmate"

            if [ ! -f /var/lib/cloud/instance/boot-finished ]; then
              echo "cloud-init 미완료: 잠시 후 배포를 재시도하세요."
              exit 1
            fi

            command -v docker >/dev/null 2>&1 || { echo "docker 미설치"; exit 1; }
            docker info >/dev/null 2>&1 || { echo "docker daemon 미준비"; exit 1; }

            mkdir -p "$APP_DIR" "$APP_DIR/Data" "$APP_DIR/temp"

            printf '%s' '__WALKINGMATE_ENV_B64__' | base64 -d > "${ENV_FILE}.raw"
            sed -e 's/\r$//' -e 's/^[[:space:]]*//' "${ENV_FILE}.raw" > "$ENV_FILE"
            rm -f "${ENV_FILE}.raw"

            docker network create "$NETWORK" >/dev/null 2>&1 || true

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE"
            DIGEST=$(docker image inspect "$IMAGE" --format '{{index .RepoDigests 0}}')

            docker stop "$APP_NAME" 2>/dev/null || true
            docker rm "$APP_NAME" 2>/dev/null || true

            docker run -d \
              --name "$APP_NAME" \
              --restart unless-stopped \
              --network "$NETWORK" \
              --env-file "$ENV_FILE" \
              -p 18080:18080 \
              -v /opt/walkingmate/Data:/app/Data \
              -v /opt/walkingmate/temp:/app/temp \
              "$DIGEST"

            for i in $(seq 1 20); do
              if curl -fsS "http://127.0.0.1:18080/health" >/dev/null; then
                echo "배포 완료: 컨테이너=$APP_NAME"
                docker image prune -f >/dev/null 2>&1 || true
                exit 0
              fi
              sleep 3
            done

            echo "헬스체크 실패"
            docker logs --tail=200 "$APP_NAME" || true
            exit 1
          EOF_SCRIPT
          )

          COMMANDS="$(printf '%s' "$COMMANDS" | sed "s|__WALKINGMATE_ENV_B64__|$WALKINGMATE_ENV_B64|g")"
          printf '%s\n' "$COMMANDS" > ssm-deploy.sh
          jq -n --rawfile script ssm-deploy.sh '{commands: [$script]}' > ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "WalkingMate Deploy" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM CommandId=$COMMAND_ID"

          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)

            case "$STATUS" in
              Success)
                echo "SSM 배포 성공"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text || true
                exit 0
                ;;
              Pending|InProgress|Delayed|"")
                echo "SSM 실행 중... 상태=$STATUS ($i/120)"
                sleep 5
                ;;
              Cancelled|Cancelling|TimedOut|Failed)
                echo "SSM 배포 실패 상태=$STATUS"
                echo "----- SSM STDOUT -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text || true
                echo "----- SSM STDERR -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" \
                  --output text || true
                exit 1
                ;;
              *)
                echo "알 수 없는 SSM 상태=$STATUS"
                sleep 5
                ;;
            esac
          done

          echo "SSM 배포 타임아웃 - 명령 취소 시도"
          aws ssm cancel-command --command-id "$COMMAND_ID" >/dev/null 2>&1 || true
          exit 1
