name: deploy-staged

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'music_server/**'
      - 'server.py'
      - 'run_worker.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      stage:
        description: '실행 단계 (ssm | docker | app)'
        required: true
        default: 'app'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-staged
  cancel-in-progress: true

jobs:
  staged-check:
    name: AWS SSM 단계별 체크
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 실행 단계 결정
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            STAGE="app"
          else
            STAGE="${{ github.event.inputs.stage || 'app' }}"
          fi
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          echo "선택된 단계: $STAGE"

      - name: jq 설치(없을 때 대비)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: GHCR 로그인 (app 단계)
        if: env.STAGE == 'app'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설치 (app 단계)
        if: env.STAGE == 'app'
        uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 및 푸시 (app 단계)
        if: env.STAGE == 'app'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/walkingmate-dev/walkingmate-server:latest

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: 대상 인스턴스 조회
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="walkingmate-ec2"
          INSTANCE_IDS=$(aws ec2 describe-instances --filters \
            "Name=tag:Name,Values=${TAG_NAME}" \
            "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)

          if [ -z "${INSTANCE_IDS}" ] || [ "${INSTANCE_IDS}" = "None" ]; then
            echo "running 인스턴스 없음: ${TAG_NAME}"
            exit 1
          fi

          COUNT=$(wc -w <<< "${INSTANCE_IDS}")
          if [ "$COUNT" -ne 1 ]; then
            echo "running 인스턴스 ${COUNT}개: ${TAG_NAME}"
            aws ec2 describe-instances --filters \
              "Name=tag:Name,Values=${TAG_NAME}" \
              "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].{Name:Tags[?Key=='Name']|[0].Value,InstanceId:InstanceId,LaunchTime:LaunchTime,PublicIp:PublicIpAddress}" \
              --output table
            exit 1
          fi

          echo "INSTANCE_ID=${INSTANCE_IDS}" >> "$GITHUB_ENV"
          aws ec2 describe-instances --instance-ids "$INSTANCE_IDS" \
            --query "Reservations[].Instances[].{Name:Tags[?Key=='Name']|[0].Value,InstanceId:InstanceId,State:State.Name,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}" \
            --output table

      - name: PingStatus 체크
        shell: bash
        run: |
          set -euo pipefail

          PING_STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text || true)

          echo "PingStatus=${PING_STATUS}"
          if [ "${PING_STATUS}" != "Online" ]; then
            echo "SSM Offline"
            exit 1
          fi

      - name: SSM 명령 전송 (단계별)
        shell: bash
        run: |
          set -euo pipefail

          STAGE="${STAGE}"
          echo "STAGE=${STAGE}"

          IMAGE="ghcr.io/walkingmate-dev/walkingmate-server:latest"
          ENV_B64="$(printf '%s' '${{ secrets.WALKINGMATE_ENV }}' | base64 -w 0)"

          case "$STAGE" in
            ssm)
              jq -n '{
                commands: [
                  "set -euo pipefail",
                  "echo WM_STAGE_SSM_START",
                  "date",
                  "uname -a",
                  "echo WM_STAGE_SSM_OK"
                ]
              }' > ssm-params.json
              ;;

            docker)
              jq -n '{
                commands: [
                  "set -euo pipefail",
                  "echo WM_STAGE_DOCKER_START",
                  "command -v docker >/dev/null 2>&1 || { echo WM_FAIL_DOCKER_NOT_FOUND; exit 12; }",
                  "docker info >/dev/null 2>&1 || { echo WM_FAIL_DOCKER_DAEMON_NOT_READY; exit 13; }",
                  "docker rm -f walkingmate_app >/dev/null 2>&1 || true",
                  "docker run -d --name walkingmate_app --restart unless-stopped -p 18080:80 nginx:alpine",
                  "for i in $(seq 1 20); do curl -fsS http://127.0.0.1:18080/ >/dev/null && { echo WM_STAGE_DOCKER_OK; exit 0; }; sleep 2; done; echo WM_FAIL_DOCKER_HEALTH; docker logs --tail=200 walkingmate_app || true; exit 14"
                ]
              }' > ssm-params.json
              ;;

            app)
              jq -n \
                --arg image "$IMAGE" \
                --arg env_b64 "$ENV_B64" \
                --arg ghcr_user "${{ secrets.GHCR_USERNAME }}" \
                --arg ghcr_token "${{ secrets.GHCR_TOKEN }}" \
                '{
                  commands: [
                    "set -euo pipefail",
                    "echo WM_STAGE_APP_START",
                    "command -v docker >/dev/null 2>&1 || { echo WM_FAIL_DOCKER_NOT_FOUND; exit 12; }",
                    "docker info >/dev/null 2>&1 || { echo WM_FAIL_DOCKER_DAEMON_NOT_READY; exit 13; }",
                    "mkdir -p /opt/walkingmate /opt/walkingmate/Data /opt/walkingmate/temp /opt/walkingmate/mysql_data /opt/walkingmate/redis_data",
                    ("printf %s " + $env_b64 + " | base64 -d > /opt/walkingmate/.env.raw"),
                    "sed -e '\''s/\\r$//'\'' -e '\''s/^[[:space:]]*//'\'' /opt/walkingmate/.env.raw > /opt/walkingmate/.env",
                    "rm -f /opt/walkingmate/.env.raw",
                    "docker network create common >/dev/null 2>&1 || true",
                    ("echo \"" + $ghcr_token + "\" | docker login ghcr.io -u \"" + $ghcr_user + "\" --password-stdin"),
                    ("docker pull " + $image),
                    "docker rm -f walkingmate_worker >/dev/null 2>&1 || true",
                    "docker rm -f walkingmate_app >/dev/null 2>&1 || true",
                    "docker rm -f walkingmate_redis >/dev/null 2>&1 || true",
                    "docker rm -f walkingmate_mysql >/dev/null 2>&1 || true",
                    "docker run -d --name walkingmate_redis --restart unless-stopped --network common -v /opt/walkingmate/redis_data:/data redis:7-alpine",
                    "docker run -d --name walkingmate_mysql --restart unless-stopped --network common --env-file /opt/walkingmate/.env -p 3306:3306 -v /opt/walkingmate/mysql_data:/var/lib/mysql mysql:8.4",
                    ("docker run -d --name walkingmate_app --restart unless-stopped --network common --env-file /opt/walkingmate/.env -p 18080:18080 -v /opt/walkingmate/Data:/app/Data -v /opt/walkingmate/temp:/app/temp " + $image),
                    ("docker run -d --name walkingmate_worker --restart unless-stopped --network common --env-file /opt/walkingmate/.env -v /opt/walkingmate/Data:/app/Data -v /opt/walkingmate/temp:/app/temp " + $image + " python run_worker.py"),
                    "for i in $(seq 1 30); do curl -fsS http://127.0.0.1:18080/health >/dev/null && { echo WM_STAGE_APP_OK; break; }; sleep 2; done",
                    "curl -fsS http://127.0.0.1:18080/health >/dev/null || { echo WM_FAIL_APP_HEALTH; docker logs --tail=200 walkingmate_app || true; exit 15; }",
                    "for i in $(seq 1 20); do docker logs --tail=80 walkingmate_worker 2>/dev/null | grep -q music_tasks && { echo WM_STAGE_WORKER_OK; break; }; sleep 2; done",
                    "docker logs --tail=80 walkingmate_worker 2>/dev/null | grep -q music_tasks || { echo WM_FAIL_WORKER_NOT_READY; docker logs --tail=200 walkingmate_worker || true; exit 16; }"
                  ]
                }' > ssm-params.json
              ;;

            *)
              echo "잘못된 stage: $STAGE"
              exit 1
              ;;
          esac

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "WalkingMate staged-check stage=${STAGE} run=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --timeout-seconds 180 \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_ENV"
          echo "SSM CommandId=${COMMAND_ID}"

      - name: SSM 결과 확인
        shell: bash
        run: |
          set -euo pipefail

          sleep 3
          for i in $(seq 1 30); do
            OUT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --output json 2>&1) || {
                echo "get-command-invocation error: $OUT (${i}/30)"
                sleep 4
                continue
              }

            STATUS=$(echo "$OUT" | jq -r '.Status // empty')
            echo "상태=${STATUS:-Unknown} (${i}/30)"

            case "$STATUS" in
              Success)
                echo "SSM 체크 성공"
                echo "----- STDOUT -----"
                echo "$OUT" | jq -r '.StandardOutputContent // ""'
                exit 0
                ;;
              Pending|InProgress|Delayed|"")
                sleep 4
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                echo "SSM 체크 실패 상태=$STATUS"
                echo "----- STDOUT -----"
                echo "$OUT" | jq -r '.StandardOutputContent // ""'
                echo "----- STDERR -----"
                echo "$OUT" | jq -r '.StandardErrorContent // ""'
                exit 1
                ;;
              *)
                echo "알 수 없는 상태=$STATUS"
                echo "$OUT"
                sleep 4
                ;;
            esac
          done

          echo "SSM 체크 타임아웃"
          aws ssm cancel-command --command-id "$COMMAND_ID" >/dev/null 2>&1 || true
          exit 1

