name: deploy-ssm-check

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-ssm-check
  cancel-in-progress: true

jobs:
  ssm-check:
    name: AWS SSM 연결 체크
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: 대상 인스턴스 조회
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="walkingmate-ec2"
          INSTANCE_IDS=$(aws ec2 describe-instances --filters \
            "Name=tag:Name,Values=${TAG_NAME}" \
            "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)

          if [ -z "${INSTANCE_IDS}" ] || [ "${INSTANCE_IDS}" = "None" ]; then
            echo "running 인스턴스 없음: ${TAG_NAME}"
            exit 1
          fi

          COUNT=$(wc -w <<< "${INSTANCE_IDS}")
          if [ "$COUNT" -ne 1 ]; then
            echo "running 인스턴스 ${COUNT}개: ${TAG_NAME}"
            aws ec2 describe-instances --filters \
              "Name=tag:Name,Values=${TAG_NAME}" \
              "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].{Name:Tags[?Key=='Name']|[0].Value,InstanceId:InstanceId,LaunchTime:LaunchTime,PublicIp:PublicIpAddress}" \
              --output table
            exit 1
          fi

          echo "INSTANCE_ID=${INSTANCE_IDS}" >> "$GITHUB_ENV"
          aws ec2 describe-instances --instance-ids "$INSTANCE_IDS" \
            --query "Reservations[].Instances[].{Name:Tags[?Key=='Name']|[0].Value,InstanceId:InstanceId,State:State.Name,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}" \
            --output table

      - name: PingStatus 체크
        shell: bash
        run: |
          set -euo pipefail

          PING_STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text || true)

          echo "PingStatus=${PING_STATUS}"
          if [ "${PING_STATUS}" != "Online" ]; then
            echo "SSM Offline"
            exit 1
          fi

      - name: SSM 명령 전송 (초경량)
        shell: bash
        run: |
          set -euo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "WalkingMate SSM Check run=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --timeout-seconds 60 \
            --parameters commands='["set -euo pipefail","echo WM_SSM_CHECK_START","date","uname -a","echo WM_SSM_CHECK_OK"]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_ENV"
          echo "SSM CommandId=${COMMAND_ID}"

      - name: SSM 결과 확인
        shell: bash
        run: |
          set -euo pipefail

          sleep 3
          for i in $(seq 1 24); do
            OUT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --output json 2>&1) || {
                echo "get-command-invocation error: $OUT (${i}/24)"
                sleep 5
                continue
              }

            STATUS=$(echo "$OUT" | jq -r '.Status // empty')
            echo "상태=${STATUS:-Unknown} (${i}/24)"

            case "$STATUS" in
              Success)
                echo "SSM 체크 성공"
                echo "----- STDOUT -----"
                echo "$OUT" | jq -r '.StandardOutputContent // ""'
                exit 0
                ;;
              Pending|InProgress|Delayed|"")
                sleep 5
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                echo "SSM 체크 실패 상태=$STATUS"
                echo "----- STDOUT -----"
                echo "$OUT" | jq -r '.StandardOutputContent // ""'
                echo "----- STDERR -----"
                echo "$OUT" | jq -r '.StandardErrorContent // ""'
                exit 1
                ;;
              *)
                echo "알 수 없는 상태=$STATUS"
                echo "$OUT"
                sleep 5
                ;;
            esac
          done

          echo "SSM 체크 타임아웃"
          aws ssm cancel-command --command-id "$COMMAND_ID" >/dev/null 2>&1 || true
          exit 1