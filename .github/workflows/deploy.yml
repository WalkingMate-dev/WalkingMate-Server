name: deploy

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'music_server/**'
      - 'server.py'
      - 'run_worker.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'deploy/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  buildImageAndPush:
    name: 도커 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.export_owner.outputs.owner_lc }}
      image_name: ${{ steps.export_image.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - name: 레지스트리 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 소유자 소문자 변환
        id: export_owner
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

      - name: 이미지 이름 설정
        id: export_image
        run: echo "image_name=walkingmate-server" >> "$GITHUB_OUTPUT"

      - name: 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:latest

  deploy:
    name: AWS SSM 블루그린 배포
    needs: [buildImageAndPush]
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: AWS 계정 확인
        shell: bash
        run: aws sts get-caller-identity

      - name: EC2 인스턴스 ID 조회
        id: get_instance_id
        shell: bash
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances --filters \
            "Name=tag:Name,Values=walkingmate-ec2" \
            "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -z "$INSTANCE_IDS" ] || [ "$INSTANCE_IDS" = "None" ]; then
            echo "실행 중인 인스턴스를 찾지 못했습니다"
            exit 1
          fi

          INSTANCE_COUNT=$(wc -w <<< "$INSTANCE_IDS")
          if [ "$INSTANCE_COUNT" -ne 1 ]; then
            echo "실행 중인 walkingmate-ec2 인스턴스가 ${INSTANCE_COUNT}개입니다. 정확히 1개여야 합니다."
            aws ec2 describe-instances --filters \
              "Name=tag:Name,Values=walkingmate-ec2" \
              "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].{InstanceId:InstanceId,PrivateIp:PrivateIpAddress,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}" \
              --output table
            exit 1
          fi

          INSTANCE_ID="$INSTANCE_IDS"
          aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query "Reservations[].Instances[].{InstanceId:InstanceId,State:State.Name,PrivateIp:PrivateIpAddress,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}" \
            --output table
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"

      - name: 배포 대상 인스턴스 접속정보 조회
        shell: bash
        run: |
          INSTANCE_PUBLIC_IP=$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" --output text)
          INSTANCE_AZ=$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].Placement.AvailabilityZone" --output text)

          if [ -z "$INSTANCE_PUBLIC_IP" ] || [ "$INSTANCE_PUBLIC_IP" = "None" ]; then
            echo "퍼블릭 IP를 찾지 못했습니다"
            exit 1
          fi
          if [ -z "$INSTANCE_AZ" ] || [ "$INSTANCE_AZ" = "None" ]; then
            echo "가용영역(AZ)을 찾지 못했습니다"
            exit 1
          fi

          echo "INSTANCE_PUBLIC_IP=$INSTANCE_PUBLIC_IP" >> "$GITHUB_ENV"
          echo "INSTANCE_AZ=$INSTANCE_AZ" >> "$GITHUB_ENV"
          echo "배포 대상: $INSTANCE_ID / $INSTANCE_PUBLIC_IP / $INSTANCE_AZ"

      - name: SSH 배포 (EC2 Instance Connect)
        shell: bash
        run: |
          set -euo pipefail

          # SSH 준비
          mkdir -p "$HOME/.ssh"
          ssh-keygen -t ed25519 -N "" -f "$HOME/.ssh/wm_ci_key" >/dev/null
          chmod 600 "$HOME/.ssh/wm_ci_key"

          inject_ssh_key() {
            local injected=0
            for i in $(seq 1 30); do
              if aws ec2-instance-connect send-ssh-public-key \
                --instance-id "$INSTANCE_ID" \
                --availability-zone "$INSTANCE_AZ" \
                --instance-os-user ec2-user \
                --ssh-public-key "file://$HOME/.ssh/wm_ci_key.pub" \
                --query Success --output text | grep -qi true; then
                injected=1
                break
              fi
              echo "임시 SSH 키 주입 재시도 $i/30"
              sleep 3
            done
            if [ "$injected" -ne 1 ]; then
              echo "EC2 Instance Connect 키 주입 실패"
              return 1
            fi
            return 0
          }

          wait_ssh_port() {
            for i in $(seq 1 30); do
              if timeout 2 bash -c "</dev/tcp/${INSTANCE_PUBLIC_IP}/22" 2>/dev/null; then
                return 0
              fi
              echo "SSH 포트 대기 $i/30"
              sleep 3
            done
            echo "SSH 포트(22) 연결 대기 실패"
            return 1
          }

          WALKINGMATE_ENV_B64="$(printf '%s' '${{ secrets.WALKINGMATE_ENV }}' | base64 -w 0)"
          COMMANDS=$(cat <<'EOF_SCRIPT'
            set -euo pipefail

            IMAGE="ghcr.io/${{ needs.buildImageAndPush.outputs.owner_lc }}/${{ needs.buildImageAndPush.outputs.image_name }}:latest"
            NETWORK="common"
            APP_BLUE="walkingmate_app_blue"
            APP_GREEN="walkingmate_app_green"
            APP_BLUE_PORT=28080
            APP_GREEN_PORT=28081
            WORKER_NAME="walkingmate_worker"
            REDIS_NAME="walkingmate_redis"
            MYSQL_NAME="walkingmate_mysql"
            PROXY_NAME="walkingmate_haproxy"
            ENV_FILE="/opt/walkingmate/.env"
            APP_DIR="/opt/walkingmate"

            # user_data가 반영되지 않았거나 신규 인스턴스인 경우도 배포가 가능하도록 보정
            if ! command -v docker >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then
                dnf install -y docker git
              elif command -v yum >/dev/null 2>&1; then
                yum install -y docker git
              else
                echo "지원되지 않는 패키지 매니저: docker 설치 불가"
                exit 1
              fi
            fi
            systemctl enable --now docker >/dev/null 2>&1 || true
            command -v docker >/dev/null 2>&1 || { echo "docker 설치/실행 실패"; exit 1; }
            mkdir -p "$APP_DIR" "$APP_DIR/Data" "$APP_DIR/temp" "$APP_DIR/haproxy"

            printf '%s' '__WALKINGMATE_ENV_B64__' | base64 -d > "${ENV_FILE}.raw"
            # 시크릿 값이 들여쓰기/CRLF로 저장된 경우를 정리한다.
            sed -e 's/\r$//' -e 's/^[[:space:]]*//' "${ENV_FILE}.raw" > "$ENV_FILE"
            rm -f "${ENV_FILE}.raw"

            require_env_key() {
              local key="$1"
              if ! grep -q "^${key}=" "$ENV_FILE"; then
                echo "필수 환경변수 누락: ${key}"
                exit 1
              fi
            }

            get_env_value() {
              local key="$1"
              awk -F= -v k="$key" '$1==k {sub(/^[^=]*=/, ""); print; exit}' "$ENV_FILE"
            }

            require_env_key MYSQL_ROOT_PASSWORD
            require_env_key MYSQL_DATABASE_INIT
            require_env_key MYSQL_USER_INIT
            require_env_key MYSQL_PASSWORD_INIT

            docker network create "$NETWORK" >/dev/null 2>&1 || true

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE"
            DIGEST=$(docker image inspect "$IMAGE" --format '{{index .RepoDigests 0}}')

            if ! docker ps --format '{{.Names}}' | grep -Fxq "$REDIS_NAME"; then
              docker run -d --name "$REDIS_NAME" --restart unless-stopped --network "$NETWORK" redis:7-alpine
            fi

            # MySQL은 Terraform user_data에서 생성/유지한다. 배포에서는 상태 확인만 수행한다.
            ensure_mysql_running() {
              if ! docker ps -a --format '{{.Names}}' | grep -Fxq "$MYSQL_NAME"; then
                echo "MySQL 컨테이너($MYSQL_NAME)가 없어 1회 자동 생성합니다."
                mkdir -p /opt/walkingmate/mysql_data
                docker run -d \
                  --name "$MYSQL_NAME" \
                  --restart unless-stopped \
                  --network "$NETWORK" \
                  -e MYSQL_ROOT_PASSWORD="$(get_env_value MYSQL_ROOT_PASSWORD)" \
                  -e MYSQL_DATABASE="$(get_env_value MYSQL_DATABASE_INIT)" \
                  -e MYSQL_USER="$(get_env_value MYSQL_USER_INIT)" \
                  -e MYSQL_PASSWORD="$(get_env_value MYSQL_PASSWORD_INIT)" \
                  -v /opt/walkingmate/mysql_data:/var/lib/mysql \
                  mysql:8.4
              fi
              docker start "$MYSQL_NAME" >/dev/null 2>&1 || true
            }

            wait_mysql() {
              local i=0
              local root_pw
              root_pw="$(get_env_value MYSQL_ROOT_PASSWORD)"
              until docker exec "$MYSQL_NAME" mysqladmin ping -h 127.0.0.1 -uroot -p"$root_pw" >/dev/null 2>&1; do
                i=$((i+1))
                if [ "$i" -ge 40 ]; then
                  echo "MySQL 준비 실패"
                  docker logs --tail=200 "$MYSQL_NAME" || true
                  exit 1
                fi
                sleep 3
              done
            }
            verify_mysql_system_tables() {
              local root_pw
              root_pw="$(get_env_value MYSQL_ROOT_PASSWORD)"
              docker exec "$MYSQL_NAME" \
                mysql -h 127.0.0.1 -uroot -p"$root_pw" -Nse "SELECT COUNT(*) FROM mysql.user;" \
                >/dev/null 2>&1
            }

            ensure_mysql_running
            wait_mysql
            if ! verify_mysql_system_tables; then
              echo "MySQL 시스템 테이블 검증 실패"
              docker logs --tail=200 "$MYSQL_NAME" || true
              exit 1
            fi

            HAS_BLUE=$(docker ps --format '{{.Names}}' | grep -Fx "$APP_BLUE" || true)
            HAS_GREEN=$(docker ps --format '{{.Names}}' | grep -Fx "$APP_GREEN" || true)

            if [ -n "$HAS_BLUE" ] && [ -z "$HAS_GREEN" ]; then
              CURRENT="$APP_BLUE"
              NEXT="$APP_GREEN"
              NEXT_PORT="$APP_GREEN_PORT"
            elif [ -n "$HAS_GREEN" ] && [ -z "$HAS_BLUE" ]; then
              CURRENT="$APP_GREEN"
              NEXT="$APP_BLUE"
              NEXT_PORT="$APP_BLUE_PORT"
            else
              CURRENT=""
              NEXT="$APP_BLUE"
              NEXT_PORT="$APP_BLUE_PORT"
            fi

            docker stop "$NEXT" 2>/dev/null || true
            docker rm "$NEXT" 2>/dev/null || true

            docker run -d \
              --name "$NEXT" \
              --restart unless-stopped \
              --network "$NETWORK" \
              --env-file "$ENV_FILE" \
              -p "$NEXT_PORT":18080 \
              -v /opt/walkingmate/Data:/app/Data \
              -v /opt/walkingmate/temp:/app/temp \
              "$DIGEST"

            wait_http() {
              local port="$1"
              local path="$2"
              local timeout="$3"
              local start elapsed
              start=$(date +%s)
              while true; do
                if curl -fsS "http://127.0.0.1:${port}${path}" >/dev/null; then
                  return 0
                fi
                elapsed=$(( $(date +%s) - start ))
                if [ "$elapsed" -ge "$timeout" ]; then
                  return 1
                fi
                sleep 3
              done
            }

            if ! wait_http "$NEXT_PORT" "/health" 120; then
              echo "새 컨테이너 헬스체크 실패"
              docker logs --tail=200 "$NEXT" || true
              exit 1
            fi

            cat > /opt/walkingmate/haproxy/haproxy.cfg <<'EOF_HAPROXY'
            global
              log stdout format raw local0

            defaults
              mode http
              option httplog
              timeout connect 5s
              timeout client 60s
              timeout server 60s

            frontend wm_front
              bind *:18080
              default_backend wm_back

            backend wm_back
              balance roundrobin
              option httpchk GET /health
              server wm_blue walkingmate_app_blue:18080 check
              server wm_green walkingmate_app_green:18080 check
            EOF_HAPROXY

            docker rm -f "$PROXY_NAME" 2>/dev/null || true
            docker run -d \
              --name "$PROXY_NAME" \
              --restart unless-stopped \
              --network "$NETWORK" \
              -p 18080:18080 \
              -v /opt/walkingmate/haproxy:/usr/local/etc/haproxy \
              haproxy:3.0

            docker stop "$WORKER_NAME" 2>/dev/null || true
            docker rm "$WORKER_NAME" 2>/dev/null || true
            docker run -d \
              --name "$WORKER_NAME" \
              --restart unless-stopped \
              --network "$NETWORK" \
              --env-file "$ENV_FILE" \
              -v /opt/walkingmate/Data:/app/Data \
              -v /opt/walkingmate/temp:/app/temp \
              "$DIGEST" \
              python run_worker.py

            if [ -n "$CURRENT" ]; then
              docker stop "$CURRENT" 2>/dev/null || true
              docker rm "$CURRENT" 2>/dev/null || true
            fi

            docker image prune -f >/dev/null 2>&1 || true
            echo "배포 완료: 활성 컨테이너=$NEXT, 포트=$NEXT_PORT"
          EOF_SCRIPT
          )
          COMMANDS="$(printf '%s' "$COMMANDS" | sed "s|__WALKINGMATE_ENV_B64__|$WALKINGMATE_ENV_B64|g")"
          run_remote_deploy() {
            printf '%s\n' "$COMMANDS" | ssh \
              -i "$HOME/.ssh/wm_ci_key" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=20 \
              -o ServerAliveCountMax=6 \
              ec2-user@"$INSTANCE_PUBLIC_IP" \
              "sudo bash -seuo pipefail"
          }

          # SSH 세션이 네트워크/도커 설치 타이밍 이슈로 끊기는 경우(255) 자동 재시도
          for attempt in $(seq 1 3); do
            inject_ssh_key
            wait_ssh_port
            set +e
            run_remote_deploy
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "SSH 배포 성공 (시도 $attempt/3)"
              exit 0
            fi
            if [ "$rc" -eq 255 ]; then
              echo "SSH 연결 끊김(255) 감지, 재시도 $attempt/3"
              sleep 10
              continue
            fi
            echo "원격 배포 실패(rc=$rc)"
            exit "$rc"
          done
          echo "SSH 배포 재시도 한도 초과"
          exit 1


