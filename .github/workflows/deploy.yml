name: deploy

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'music_server/**'
      - 'server.py'
      - 'run_worker.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'deploy/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  buildImageAndPush:
    name: 도커 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.export_owner.outputs.owner_lc }}
      image_name: ${{ steps.export_image.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 레포 소유자 소문자 변환
        id: export_owner
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

      - name: 이미지 이름 고정
        id: export_image
        shell: bash
        run: echo "image_name=walkingmate-server" >> "$GITHUB_OUTPUT"

      - name: 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:latest

  deploy:
    name: AWS SSM 배포
    needs: [buildImageAndPush]
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: AWS 계정 확인
        shell: bash
        run: aws sts get-caller-identity

      - name: 배포 대상 인스턴스 조회
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_IDS=$(aws ec2 describe-instances --filters \
            "Name=tag:Name,Values=walkingmate-ec2" \
            "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)

          if [ -z "${INSTANCE_IDS}" ] || [ "${INSTANCE_IDS}" = "None" ]; then
            echo "실행 중인 walkingmate-ec2 인스턴스를 찾지 못했습니다"
            exit 1
          fi

          COUNT=$(wc -w <<< "${INSTANCE_IDS}")
          if [ "${COUNT}" -ne 1 ]; then
            echo "실행 중인 walkingmate-ec2 인스턴스가 ${COUNT}개입니다. 정확히 1개여야 합니다."
            aws ec2 describe-instances --filters \
              "Name=tag:Name,Values=walkingmate-ec2" \
              "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].{InstanceId:InstanceId,PrivateIp:PrivateIpAddress,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}" \
              --output table
            exit 1
          fi

          INSTANCE_ID="${INSTANCE_IDS}"
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_ENV"
          aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query "Reservations[].Instances[].{InstanceId:InstanceId,State:State.Name,PrivateIp:PrivateIpAddress,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}" \
            --output table

      - name: SSM 상태 확인
        shell: bash
        run: |
          set -euo pipefail
          PING_STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text || true)
          if [ "${PING_STATUS}" != "Online" ]; then
            echo "SSM PingStatus가 Online이 아닙니다: ${PING_STATUS}"
            exit 1
          fi

      - name: 이전 InProgress 명령 정리
        shell: bash
        run: |
          set -euo pipefail
          IDS=$(aws ssm list-command-invocations \
            --details \
            --query "CommandInvocations[?InstanceId=='${INSTANCE_ID}' && Status=='InProgress'].CommandId" \
            --output text || true)

          if [ -n "${IDS:-}" ] && [ "${IDS}" != "None" ]; then
            echo "정리 대상 InProgress: ${IDS}"
            for OLD_ID in $IDS; do
              aws ssm cancel-command --command-id "$OLD_ID" >/dev/null 2>&1 || true
            done
          else
            echo "정리할 InProgress 명령 없음"
          fi

      - name: SSM 배포 실행
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ needs.buildImageAndPush.outputs.owner_lc }}/${{ needs.buildImageAndPush.outputs.image_name }}:latest"
          ENV_B64="$(printf '%s' '${{ secrets.WALKINGMATE_ENV }}' | base64 -w 0)"

          cat > ssm-params.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "if [ ! -f /var/lib/cloud/instance/boot-finished ]; then echo cloud-init 미완료; exit 1; fi",
              "command -v docker >/dev/null 2>&1 || { echo docker 미설치; exit 1; }",
              "docker info >/dev/null 2>&1 || { echo docker daemon 미준비; exit 1; }",
              "mkdir -p /opt/walkingmate /opt/walkingmate/Data /opt/walkingmate/temp",
              "printf '%s' '${ENV_B64}' | base64 -d > /opt/walkingmate/.env.raw",
              "sed -e 's/\\r$//' -e 's/^[[:space:]]*//' /opt/walkingmate/.env.raw > /opt/walkingmate/.env",
              "rm -f /opt/walkingmate/.env.raw",
              "docker network create common >/dev/null 2>&1 || true",
              "echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin",
              "docker pull ${IMAGE}",
              "docker stop walkingmate_app >/dev/null 2>&1 || true",
              "docker rm walkingmate_app >/dev/null 2>&1 || true",
              "docker run -d --name walkingmate_app --restart unless-stopped --network common --env-file /opt/walkingmate/.env -p 18080:18080 -v /opt/walkingmate/Data:/app/Data -v /opt/walkingmate/temp:/app/temp ${IMAGE}",
              "for i in $(seq 1 30); do curl -fsS http://127.0.0.1:18080/health >/dev/null && exit 0; sleep 2; done; echo 헬스체크 실패; docker logs --tail=200 walkingmate_app || true; exit 1"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "WalkingMate Deploy" \
            --timeout-seconds 900 \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_ENV"
          echo "SSM CommandId=${COMMAND_ID}"

      - name: SSM 완료 대기
        shell: bash
        run: |
          set -euo pipefail

          if aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"; then
            echo "SSM 배포 성공"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text || true
            exit 0
          fi

          echo "SSM 배포 실패"
          echo "----- SSM STDOUT -----"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text || true
          echo "----- SSM STDERR -----"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text || true
          aws ssm cancel-command --command-id "$COMMAND_ID" >/dev/null 2>&1 || true
          exit 1
